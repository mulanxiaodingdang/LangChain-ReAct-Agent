  # ========== 跨论文对比 (5题) ==========
  - id: "C001"
    category: "comparison"
    question: "DnD 和 BTD 在目标平台、核心方法上有什么区别？"
    required_sections: ["method", "introduction"]

  - id: "C002"
    category: "comparison"
    question: "BTD 和 NeuroDeX 在 operator type recognition 的方法上有什么不同？"
    required_sections: ["method"]

  - id: "C003"
    category: "comparison"
    question: "DnD 和 NeuroDeX 都追求跨架构支持，它们的核心思路有什么差异？"
    required_sections: ["method", "introduction"]

  - id: "C004"
    category: "comparison"
    question: "三篇论文在输出目标上有什么共同点？"
    required_sections: ["abstract", "introduction"]

  - id: "C005"
    category: "comparison"
    question: "这三篇论文中，哪篇明确处理了量化编译模型？"
    required_sections: ["abstract", "method"]

  # ========== 知识边界 / 不可答问题 (3题) ==========
  - id: "U001"
    category: "boundary"
    question: "这些论文有没有讨论 GPT-6 的实验结果？"

  - id: "U002"
    category: "boundary"
    question: "DnD 是否报告了在量子计算机上的部署实验？"

  - id: "U003"
    category: "boundary"
    question: "NeuroDeX 是否给出了医学临床试验中的患者人数和治疗效果？"
